<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>OS Mini Project</title>
    <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCLWuH31-gHwUEjRozs3y-jfNwjsTmnvAXRQ&s">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
      /* Smooth transitions */
      * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
      
      /* Sleek Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

      #particles-js {
        position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
      }
      
      /* --- Gradients --- */
      body {
        /* Light Gradient */
        background: linear-gradient(359.3deg, rgb(196, 214, 252) 1%, rgba(187, 187, 187, 0) 70.9%);
        background-attachment: fixed;
        background-size: cover;
      }
      
      html.dark body {
        /* Dark Gradient */
        background: linear-gradient(179.2deg, rgb(34, 34, 34) 0%, rgb(8, 0, 153) 29.7%, rgb(118, 6, 166) 63.4%, rgba(233, 0, 64, 0.58) 100.1%);
        background-attachment: fixed;
        background-size: cover;
      }

      /* --- Glass UI --- */
      .glass-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }

      html.dark .glass-card {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body class="text-zinc-900 dark:text-zinc-100 antialiased h-screen flex flex-col relative overflow-hidden transition-colors">
    
    <div id="particles-js"></div>

    <header class="glass-card mx-6 mt-6 rounded-2xl px-6 py-4 flex justify-between items-center z-10" data-aos="fade-down">
      <div class="flex items-center gap-4">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCLWuH31-gHwUEjRozs3y-jfNwjsTmnvAXRQ&s" alt="Logo" class="w-8 h-8 rounded-full border-2 border-white/50 shadow-lg object-cover">
        <h1 class="text-lg font-bold tracking-widest uppercase shadow-sm"><span id="typed-title"></span></h1>
      </div>
      
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" data-tippy-content="Toggle Light/Dark Mode" class="p-2 rounded-full bg-white/20 hover:bg-white/40 dark:bg-black/30 dark:hover:bg-black/50 transition-colors backdrop-blur-md">
          <svg id="theme-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>

        <div class="flex items-center gap-2 glass-card px-4 py-2 rounded-full cursor-pointer" data-tippy-content="System Status: Optimal">
          <span class="w-2.5 h-2.5 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.8)] animate-pulse"></span>
          <span class="text-xs font-bold tracking-widest uppercase">Connected</span>
        </div>
      </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row gap-6 p-6 min-h-0 w-full max-w-[1800px] mx-auto z-10">
      
      <div class="flex flex-col w-full lg:w-1/2 min-h-0" data-aos="fade-right" data-aos-delay="100">
        <div class="glass-card rounded-2xl flex flex-col flex-1 relative overflow-hidden">
          
          <div class="bg-white/10 dark:bg-black/30 px-5 py-3 flex justify-between items-center border-b border-white/20 select-none">
            <div class="flex gap-2 items-center">
              <span class="ml-3 text-xs font-mono opacity-60">Live Terminal 💻</span>
            </div>
            <button onclick="document.getElementById('terminal').innerHTML = ''" class="text-xs font-mono font-bold opacity-50 hover:opacity-100 transition-opacity uppercase tracking-widest" data-tippy-content="Clear Output">
              Clear
            </button>
          </div>

          <pre id="terminal" class="flex-1 overflow-y-auto p-5 font-mono text-sm whitespace-pre-wrap leading-relaxed shadow-inner" style="text-shadow: 0 1px 2px rgba(0,0,0,0.5);"></pre>

        </div>
      </div>

      <div class="flex flex-col w-full lg:w-1/2 min-h-0" data-aos="fade-left" data-aos-delay="150">
        <div class="glass-card rounded-2xl flex flex-col flex-1 min-h-[400px] overflow-hidden">
          
          <div class="flex justify-between items-center px-5 py-3 border-b border-white/20 bg-white/10 dark:bg-black/20">
            <h2 class="text-xs uppercase tracking-widest font-bold opacity-80">Live Editor</h2>
            <button onclick="dispatchCode()" class="bg-white/20 hover:bg-white/40 dark:bg-white/10 dark:hover:bg-white/20 px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all active:scale-95 border border-white/20" data-tippy-content="Compile & Run Payload">
              Execute
            </button>
          </div>
          
          <textarea id="codeInput" spellcheck="false" class="flex-1 bg-transparent w-full p-5 font-mono text-sm focus:outline-none resize-none placeholder:opacity-40" placeholder="#include <stdio.h>&#10;&#10;int main() {&#10;    printf(&quot;Grid is online.\\n&quot;);&#10;    return 0;&#10;}"></textarea>

          <div class="bg-white/10 dark:bg-black/40 border-t border-white/20 px-5 py-4 flex items-center gap-3 transition-colors backdrop-blur-md mt-auto">
            <span class="font-mono text-sm font-bold animate-pulse opacity-80">❯</span>
            <input type="text" id="termInput" placeholder="Enter Inputs Here" class="flex-1 bg-transparent border-none outline-none font-mono text-sm placeholder:opacity-50" />
            <button onclick="sendTerminalInput()" class="text-xs font-bold uppercase tracking-widest opacity-60 hover:opacity-100 transition-opacity px-2">ENTER ↵</button>
          </div>

        </div>
      </div>
      
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

    <script>
      // === Initialization & Config ===
      AOS.init({ duration: 800, once: true });
      
      const socket = typeof io !== 'undefined' ? io() : { on:()=>{}, emit:()=>{}, id: 'mock-id' };
      const terminal = document.getElementById("terminal");

      // Audio (Howler)
      const sounds = {
        keypress: new Howl({ src: ['https://actions.google.com/sounds/v1/water/water_drip.ogg'], volume: 0.1 }),
        error: new Howl({ src: ['https://actions.google.com/sounds/v1/alarms/beep_short.ogg'], volume: 0.2 }),
        success: new Howl({ src: ['https://actions.google.com/sounds/v1/glass/glass_clink.ogg'], volume: 0.3 })
      };

      // Theme Toggle logic
      function toggleTheme() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        const isDark = html.classList.contains('dark');
        document.getElementById('theme-icon').innerHTML = isDark 
          ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />' // Moon
          : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />'; // Sun
      }

      // Typed.js
      new Typed('#typed-title', {
        strings: ['OS MINI PROJECT'],
        typeSpeed: 60, backSpeed: 30, loop: true, showCursor: true
      });

      // Tooltips (Tippy.js)
      tippy('[data-tippy-content]', { theme: 'translucent', animation: 'scale' });

      // Particles.js
      particlesJS('particles-js', {
        particles: {
          number: { value: 30 },
          color: { value: '#000000' },
          opacity: { value: 0.2 },
          size: { value: 3 },
          line_linked: { enable: true, distance: 150, color: '#000000', opacity: 0.2, width: 1 },
          move: { enable: true, speed: 1 }
        },
        interactivity: { detect_on: "canvas", events: { onhover: { enable: true, mode: "grab" } } }
      });

      // === Application Logic ===

      const getTime = () => `[${dayjs().format('HH:mm:ss')}]`;

      socket.on("terminal_output", (data) => {
        const cleanText = data.replace(/\x1b\[[0-9;]*m/g, "");
        terminal.innerHTML += `${getTime()} ${cleanText}`;
        terminal.scrollTop = terminal.scrollHeight;
      });

      function appendToTerminal(text, type = "info") {
        const color = type === "error" ? "text-red-400 font-bold" : "opacity-80";
        terminal.innerHTML += `<span class="${color}">${getTime()} ${text}</span>\n`;
        terminal.scrollTop = terminal.scrollHeight;
      }

      async function dispatchCode() {
        const code = document.getElementById("codeInput").value;
        if (!code) {
          sounds.error.play();
          return Swal.fire({ title: 'Empty Buffer', text: 'Live editor contains no executable code.', icon: 'warning', background: 'rgba(0,0,0,0.8)', color: '#fff', confirmButtonColor: '#fff', backdrop: 'rgba(0,0,0,0.4)' });
        }

        sounds.success.play();
        appendToTerminal(`> Compiling payload via JIT...`);
        try {
          await axios.post('/api/run-code', { code: code, socketId: socket.id });
        } catch(e) {
          appendToTerminal(`> Execution failed at memory allocation.`, "error");
        }
      }

      // Terminal Input Logic
      const playKeySound = _.debounce(() => sounds.keypress.play(), 50, { leading: true, trailing: false });
      document.getElementById('termInput').addEventListener('keydown', playKeySound);

      function sendTerminalInput() {
        const inputEl = document.getElementById("termInput");
        const text = inputEl.value;
        if (text) {
          terminal.innerHTML += `<span class="opacity-100 font-bold">${getTime()} > ${text}</span>\n`;
          terminal.scrollTop = terminal.scrollHeight;
          socket.emit("terminal_input", text);
          inputEl.value = "";
        }
      }

      document.getElementById('termInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendTerminalInput();
      });

    </script>
  </body>
</html>
